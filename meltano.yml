send_anonymous_usage_stats: true
project_id: "tap-survicate"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-survicate"
    namespace: "tap_survicate"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: api_key
      kind: password
      label: API Key
      description: >-
        Survicate API key. Find it in the Survicate panel under
        Surveys Settings → Access Keys.
      sensitive: true

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: The earliest response date to sync (ISO 8601).

    - name: survey_ids
      kind: array
      label: Survey IDs
      description: >-
        Optional list of survey IDs to sync. When set, only surveys whose ID
        matches an entry in this list will be synced. When omitted, all surveys are synced.

    settings_group_validation:
    - [api_key]

    config:
      api_key: $TAP_SURVICATE_API_KEY
      survey_ids: ["472f11b83a067afc"]

    select:
      - "*.*"

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
